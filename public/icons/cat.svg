<svg xmlns="http://www.w3.org/2000/svg" width="64" height="56" viewBox="0 0 64 56">
  <defs>
    <linearGradient id="catBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2a20"/>
      <stop offset="100%" stop-color="#1a1410"/>
    </linearGradient>
    <linearGradient id="catBelly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4b890"/>
      <stop offset="100%" stop-color="#a88862"/>
    </linearGradient>
  </defs>
  <!-- Tail -->
  <path d="M52 30 q10 -2 10 -10 q0 -3 -3 -3" fill="none" stroke="url(#catBody)" stroke-width="6" stroke-linecap="round">
    <animate attributeName="d" dur="1.6s" repeatCount="indefinite"
      values="M52 30 q10 -2 10 -10 q0 -3 -3 -3;
              M52 30 q12 2 13 -6 q1 -4 -2 -6;
              M52 30 q10 -2 10 -10 q0 -3 -3 -3"/>
  </path>
  <!-- Body -->
  <ellipse cx="30" cy="38" rx="22" ry="14" fill="url(#catBody)"/>
  <!-- Belly -->
  <ellipse cx="30" cy="44" rx="14" ry="8" fill="url(#catBelly)" opacity="0.7"/>
  <!-- Head -->
  <circle cx="14" cy="26" r="13" fill="url(#catBody)"/>
  <!-- Ears -->
  <path d="M5 18 L4 8 L13 16 Z" fill="url(#catBody)"/>
  <path d="M23 18 L24 8 L15 16 Z" fill="url(#catBody)"/>
  <path d="M7 16 L7 11 L11 15 Z" fill="#c9a962" opacity="0.7"/>
  <path d="M21 16 L21 11 L17 15 Z" fill="#c9a962" opacity="0.7"/>
  <!-- Eyes (tracking) -->
  <g class="cat-eyes">
    <ellipse cx="10" cy="26" rx="2.2" ry="2.8" fill="#f5f0e8"/>
    <ellipse cx="18" cy="26" rx="2.2" ry="2.8" fill="#f5f0e8"/>
    <ellipse class="cat-pupil cat-pupil-l" cx="10" cy="26" rx="1.1" ry="1.8" fill="#0c0c0c"/>
    <ellipse class="cat-pupil cat-pupil-r" cx="18" cy="26" rx="1.1" ry="1.8" fill="#0c0c0c"/>
  </g>
  <!-- Nose & mouth -->
  <path d="M13 30 q1 1 2 0" fill="none" stroke="#c9a962" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M14 31 v1.6 q-1.2 1.4 -2.4 0 M14 32.6 q1.2 1.4 2.4 0" fill="none" stroke="#1a1410" stroke-width="0.9" stroke-linecap="round"/>
  <!-- Whiskers -->
  <g stroke="#f5f0e8" stroke-width="0.6" stroke-linecap="round" opacity="0.7" fill="none">
    <path d="M3 28 L9 30"/>
    <path d="M3 31 L9 31.5"/>
    <path d="M19 30 L25 28"/>
    <path d="M19 31.5 L25 31"/>
  </g>
  <!-- Paws -->
  <ellipse cx="20" cy="50" rx="3.5" ry="2.5" fill="#1a1410"/>
  <ellipse cx="32" cy="51" rx="3.5" ry="2.5" fill="#1a1410"/>
  <ellipse cx="44" cy="50" rx="3.5" ry="2.5" fill="#1a1410"/>
</svg>
