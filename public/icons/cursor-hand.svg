<svg xmlns="http://www.w3.org/2000/svg" width="44" height="48" viewBox="0 0 44 48">
  <defs>
    <linearGradient id="pinkGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffc0d2"/>
      <stop offset="100%" stop-color="#ff85ad"/>
    </linearGradient>
    <filter id="softShadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.2" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <g filter="url(#softShadow2)">
    <!-- Hand: pointing index finger up, fist below -->
    <!-- Index finger -->
    <rect x="16" y="3" width="9" height="20" rx="4.5"
          fill="url(#pinkGrad2)" stroke="#ffffff" stroke-width="1.8"/>
    <!-- Thumb on the side -->
    <path d="M25 18 q6 -1 7 4 q1 4 -3 6 l-4 1 z"
          fill="url(#pinkGrad2)" stroke="#ffffff" stroke-width="1.8" stroke-linejoin="round"/>
    <!-- Fist palm -->
    <path d="M9 22 q0 -3 3 -3 h17 q4 0 4 4 v9 q0 8 -8 9 h-9 q-7 0 -7 -7 z"
          fill="url(#pinkGrad2)" stroke="#ffffff" stroke-width="1.8" stroke-linejoin="round"/>
    <!-- Folded fingers lines -->
    <g stroke="#ffffff" stroke-width="1.4" stroke-linecap="round" opacity="0.85" fill="none">
      <path d="M14 28 q3 -2 6 0"/>
      <path d="M14 33 q3 -2 6 0"/>
      <path d="M14 38 q3 -2 6 0"/>
    </g>
  </g>
  <!-- Cute closed-eye face -->
  <g fill="none" stroke="#7a2a3e" stroke-linecap="round" stroke-width="1.2">
    <path d="M14.5 28 q1.6 1.4 3.2 0"/>
    <path d="M22.5 28 q1.6 1.4 3.2 0"/>
    <path d="M17.5 33 q2.5 1.4 5 0"/>
  </g>
  <circle cx="13" cy="32" r="1.4" fill="#ff6c95" opacity="0.55"/>
  <circle cx="29" cy="32" r="1.4" fill="#ff6c95" opacity="0.55"/>
</svg>
